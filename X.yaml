skill: verifier-state-audit
version: "0.1.0"

catalog:
  kind: skill
  audience: public
  visibility: public
  role: canonical

harness:
  cases:
    - name: live-verifier-packet-is-present
      runner: default
      inputs:
        status_url: https://gofrantic.com/v1/agents/agent-0d35e5/status
        bounty_url: https://gofrantic.com/v1/bounties/31
      expect:
        status: sealed
        receipt:
          schema: runx.receipt.v1
          state: sealed
          disposition: closed
          reason_code: process_closed
    - name: invalid-public-endpoint-is-refused
      runner: default
      inputs:
        status_url: https://gofrantic.com/v1/agents/not-a-real-agent/status
        bounty_url: https://gofrantic.com/v1/bounties/31
      expect:
        status: failure
        receipt:
          schema: runx.receipt.v1
          state: sealed
          disposition: closed
          reason_code: process_failed

runners:
  default:
    default: true
    type: cli-tool
    command: D:\NodeJS\node.exe
    args:
      - run.mjs
    inputs:
      status_url:
        type: string
        required: true
      bounty_url:
        type: string
        required: true
