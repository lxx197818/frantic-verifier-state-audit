name: Generate verifier-state audit evidence

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths-ignore:
      - evidence.json
      - verification.json
      - report.md
      - run-output.json
      - receipts/**

permissions:
  contents: write

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install runx
        run: npm install --global @runxhq/cli@0.6.13
      - name: Run governed audit
        env:
          RUNX_RECEIPT_SIGN_KID: agent-0d35e5-audit
          RUNX_RECEIPT_SIGN_ED25519_SEED_BASE64: QkJCQkJCQkJCQkJCQkJCQkJCQkJCQkJCQkJCQkJCQkI=
          RUNX_RECEIPT_SIGN_ISSUER_TYPE: hosted
          RUNX_RECEIPT_DIR: ${{ github.workspace }}/receipts
        run: |
          runx --version | tee runx-version.txt
          runx skill . \
            --input status_url=https://gofrantic.com/v1/agents/agent-0d35e5/status \
            --input bounty_url=https://gofrantic.com/v1/bounties/31 \
            --json | tee run-output.json
          RECEIPT_FILE="$(find receipts -type f -name '*.json' | head -n 1)"
          test -n "$RECEIPT_FILE"
          runx verify --receipt "$RECEIPT_FILE" --json | tee verification.json
          node build-evidence.mjs
      - name: Commit durable evidence
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add evidence.json verification.json report.md run-output.json runx-version.txt receipts
          git diff --cached --quiet || git commit -m "docs: publish governed audit evidence"
          git push
